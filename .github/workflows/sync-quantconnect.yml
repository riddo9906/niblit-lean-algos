name: Sync QuantConnect Cloud Projects

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # No third-party packages needed — download_qc_projects.py uses
          # the stdlib-only qc_client.py with HMAC-SHA256 auth.

      - name: Download QuantConnect cloud projects
        env:
          QC_USER_ID: ${{ secrets.QUANTCONNECT_USER_ID }}
          QC_API_CRED: ${{ secrets.QUANTCONNECT_API_CRED }}
        run: |
          python scripts/download_qc_projects.py
