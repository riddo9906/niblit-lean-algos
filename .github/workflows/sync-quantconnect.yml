name: Sync QuantConnect Cloud Projects

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Download QuantConnect cloud projects
        env:
          QC_USER_ID: ${{ secrets.QUANTCONNECT_USER_ID }}
          QC_API_KEY: ${{ secrets.QUANTCONNECT_API_KEY }}
        run: |
          python scripts/download_qc_projects.py
