name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check — every .py file must parse cleanly
        run: |
          python - <<'EOF'
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['.git', '__pycache__', 'node_modules', '.venv', 'venv']]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All Python files parse cleanly')
          EOF

      - name: Smoke import — NiblitBridge must be importable
        run: |
          python -c "from niblit_bridge.connector import NiblitBridge; print('NiblitBridge import: OK')"

      - name: Validate lean.json schema
        run: |
          python - <<'EOF'
          import json, sys
          with open('lean.json') as f:
              data = json.load(f)
          required_keys = ['organization-id', 'user-id', 'workspace']
          missing = [k for k in required_keys if k not in data]
          if missing:
              print(f"lean.json missing keys: {missing}")
              sys.exit(1)
          print(f"lean.json valid — workspace: {data['workspace']}")
          EOF

      - name: Verify algorithm directory structure
        run: |
          python - <<'EOF'
          import json, os, sys
          algos_dir = "algorithms"
          if not os.path.isdir(algos_dir):
              print(f"algorithms/ directory not found")
              sys.exit(1)
          algos = sorted(d for d in os.listdir(algos_dir) if os.path.isdir(os.path.join(algos_dir, d)))
          missing_main = [d for d in algos if not os.path.isfile(os.path.join(algos_dir, d, "main.py"))]
          if missing_main:
              print(f"Algorithms missing main.py: {missing_main}")
              sys.exit(1)
          print(f"All {len(algos)} algorithms have main.py")

          # Validate per-algorithm config.json files
          missing_cfg = [d for d in algos if not os.path.isfile(os.path.join(algos_dir, d, "config.json"))]
          if missing_cfg:
              print(f"Algorithms missing config.json: {missing_cfg}")
              sys.exit(1)
          cfg_errors = []
          for d in algos:
              cfg_path = os.path.join(algos_dir, d, "config.json")
              try:
                  with open(cfg_path) as fh:
                      cfg = json.load(fh)
                  required = {"algorithm-language", "algorithm-location", "algorithm-type-name"}
                  missing_keys = required - set(cfg.keys())
                  if missing_keys:
                      cfg_errors.append(f"{cfg_path}: missing keys {missing_keys}")
              except (json.JSONDecodeError, OSError) as e:
                  cfg_errors.append(f"{cfg_path}: {e}")
          if cfg_errors:
              for e in cfg_errors:
                  print(e)
              sys.exit(1)
          print(f"All {len(algos)} algorithms have valid config.json")
          EOF
