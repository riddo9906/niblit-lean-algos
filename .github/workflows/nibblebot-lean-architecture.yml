name: "🏗️ Nibblebot: Lean Algo Architecture Proposal"

# Generates architecture improvement proposals for the niblit-lean-algos
# repository — covering algorithm structure, the Niblit bridge layer,
# QuantConnect integration patterns, and signal-flow design.

on:
  schedule:
    - cron: "0 9 * * 3"  # Every Wednesday at 09:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print proposal instead of creating issue)"
        required: false
        default: "false"
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  architecture:
    name: Generate Lean Algo Architecture Proposal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lean algo architecture bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AIOS_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python nibblebots/aios_architecture_bot.py
