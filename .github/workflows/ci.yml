name: CI Validation

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  validate:
    name: Pre-deployment validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate lean.json
        run: python -c "import json, sys; data = json.load(open('lean.json')); print('lean.json is valid JSON'); print(f'  organization-id: {data.get(\"organization-id\", \"(not set)\")}')"

      - name: Syntax check — niblit_bridge
        run: |
          python -m py_compile niblit_bridge/__init__.py
          python -m py_compile niblit_bridge/connector.py

      - name: Syntax check — scripts
        run: python -m py_compile scripts/deploy_all_to_qc.py

      - name: Syntax check — all algorithm main.py files
        run: |
          python - <<'EOF'
          import ast, os, sys
          errors = []
          algos_dir = "algorithms"
          for d in sorted(os.listdir(algos_dir)):
              main_py = os.path.join(algos_dir, d, "main.py")
              if os.path.isfile(main_py):
                  try:
                      with open(main_py) as fh:
                          ast.parse(fh.read())
                  except SyntaxError as e:
                      errors.append(f'{main_py}: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          algo_count = len([d for d in os.listdir(algos_dir) if os.path.isfile(os.path.join(algos_dir, d, "main.py"))])
          print(f"All {algo_count} algorithm files parse cleanly")
          EOF
