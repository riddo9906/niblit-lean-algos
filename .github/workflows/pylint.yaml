name: Pylint

on:
  push:
    branches:
      - master
      - main
  pull_request_target:
    branches:
      - master
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pylint
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Pylint (JSON report)
        run: |
          PYTHONPATH="${PYTHONPATH}:$(pwd)" pylint \
            --exit-zero \
            --output-format=json \
            niblit_bridge/ \
            scripts/ \
            > pylint-report-${{ matrix.python-version }}.json 2>&1 || true

      - name: Generate text report
        run: |
          PYTHONPATH="${PYTHONPATH}:$(pwd)" pylint \
            --exit-zero \
            niblit_bridge/ \
            scripts/ \
            2>&1 | head -100 > pylint-report-${{ matrix.python-version }}.txt || true

      - name: Display results
        if: always()
        run: |
          if [ -f pylint-report-${{ matrix.python-version }}.txt ]; then
            cat pylint-report-${{ matrix.python-version }}.txt
          fi

      - name: Upload pylint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pylint-reports-${{ matrix.python-version }}
          path: |
            pylint-report-${{ matrix.python-version }}.json
            pylint-report-${{ matrix.python-version }}.txt
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request_target' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PYLINT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const pythonVersion = '${{ matrix.python-version }}';
            try {
              const report = fs.readFileSync(`pylint-report-${pythonVersion}.txt`, 'utf8');
              const PREVIEW_LINES = 50;
              const lines = report.split("\n").slice(0, PREVIEW_LINES);
              const comment = `## PyLint Results (Python ${pythonVersion})

            \`\`\`
            ${lines.join('\n')}
            \`\`\`

            [Full report available in artifacts]`;
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not post comment:', error);
            }
